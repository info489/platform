<html lang="en">

<title>Spanish Millennium Platform</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f7fa;color:#1a1a1a;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;min-height:100vh}

/* ── BRAND COLORS ──────────────────────────────────────────────────────────── */
:root{
  --blue:#0057E1;
  --blue-dark:#0040B0;
  --blue-light:#E8F0FE;
  --blue-mid:#3373E8;
  --black:#1a1a1a;
  --gray-text:#4a4a4a;
  --gray-mid:#767676;
  --gray-light:#e8e8e8;
  --bg:#f5f7fa;
  --white:#ffffff;
  --gold:#c8a96e;
  --gold-light:#fff8ee;
  --gold-border:#f0d49a;
  --green:#0a7c4e;
  --green-light:#e6f5ee;
  --green-border:#5dca9a;
  --red:#c0392b;
  --red-light:#fceaea;
  --red-border:#e88a8a;
}

/* ── LOGIN ─────────────────────────────────────────────────────────────────── */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f5f7fa}
.login-box{width:400px;background:#fff;border:1px solid var(--gray-light);border-radius:4px;padding:48px 40px;box-shadow:0 2px 16px rgba(0,0,0,.06)}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo-mark{display:inline-flex;align-items:center;gap:10px;margin-bottom:8px}
.login-chevron{width:36px;height:36px;background:var(--blue);border-radius:4px;display:flex;align-items:center;justify-content:center}
.login-chevron svg{width:20px;height:20px;fill:#fff}
.login-logo h1{font-size:22px;font-weight:700;color:var(--black);letter-spacing:-.3px}
.login-logo p{font-size:12px;color:var(--gray-mid);letter-spacing:.06em;text-transform:uppercase;margin-top:4px}
.form-group{margin-bottom:18px}
.form-label{font-size:12px;font-weight:600;color:var(--gray-text);letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px;display:block}
.form-input{width:100%;padding:11px 14px;border:1.5px solid var(--gray-light);border-radius:3px;font-size:14px;font-family:inherit;outline:none;background:#fff;color:var(--black);transition:border-color .15s}
.form-input:focus{border-color:var(--blue)}
.login-btn{width:100%;padding:13px;background:var(--blue);color:#fff;border:none;border-radius:3px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s;letter-spacing:.02em;margin-top:4px}
.login-btn:hover{background:var(--blue-dark)}
.login-error{background:var(--red-light);color:var(--red);border:1px solid var(--red-border);border-radius:3px;padding:10px 14px;font-size:13px;margin-bottom:16px;display:none}
.login-demo{text-align:center;font-size:11px;color:#bbb;margin-top:20px;line-height:1.8}

/* ── LAYOUT ─────────────────────────────────────────────────────────────────── */
.platform{display:flex;min-height:100vh}
.sidebar{width:240px;background:#fff;border-right:1.5px solid var(--gray-light);display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:100}
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid var(--gray-light);display:flex;align-items:center;gap:10px}
.sidebar-chevron{width:28px;height:28px;background:var(--blue);border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sidebar-chevron svg{width:16px;height:16px;fill:#fff}
.sidebar-logo-text h1{font-size:15px;font-weight:700;color:var(--black);letter-spacing:-.2px;line-height:1.2}
.sidebar-logo-text span{font-size:10px;color:var(--gray-mid);letter-spacing:.08em;text-transform:uppercase}
.role-badge{margin:10px 16px;padding:5px 10px;border-radius:2px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;text-align:center}
.rb-admin{background:var(--blue-light);color:var(--blue)}
.rb-collab{background:#eef4ff;color:#2d5bba}
.rb-student{background:var(--green-light);color:var(--green)}
.rb-corporate{background:#f0eeff;color:#5040b0}
.sidebar-nav{flex:1;padding:8px 0;overflow-y:auto}
.nav-section{padding:14px 16px 4px;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:#bbb;font-weight:700}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 18px;cursor:pointer;color:var(--gray-text);font-size:13px;transition:all .12s;border-left:3px solid transparent;width:100%;background:none;border-top:none;border-right:none;border-bottom:none;text-align:left;font-family:inherit;font-weight:500}
.nav-item:hover{color:var(--blue);background:var(--blue-light)}
.nav-item.active{color:var(--blue);background:var(--blue-light);border-left-color:var(--blue);font-weight:700}
.nav-item .ni{font-size:14px;width:18px;text-align:center}
.sidebar-footer{padding:14px 16px;border-top:1px solid var(--gray-light)}
.user-card{display:flex;align-items:center;gap:10px;padding:10px;border-radius:3px;background:var(--bg);cursor:pointer;transition:all .12s}
.user-card:hover{background:#eaecf0}
.user-av{width:32px;height:32px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.user-name{font-size:13px;font-weight:600;color:var(--black)}
.logout-hint{font-size:10px;color:#bbb;margin-top:1px}

/* ── MAIN ───────────────────────────────────────────────────────────────────── */
.main{margin-left:240px;flex:1;min-height:100vh}
.topbar{height:56px;background:#fff;border-bottom:1.5px solid var(--gray-light);display:flex;align-items:center;justify-content:space-between;padding:0 32px;position:sticky;top:0;z-index:50}
.topbar-title{font-size:18px;font-weight:700;color:var(--black);letter-spacing:-.3px}
.topbar-right{display:flex;align-items:center;gap:10px}
.page{padding:32px}

/* ── STATS ──────────────────────────────────────────────────────────────────── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
.stat-card{background:#fff;border:1.5px solid var(--gray-light);border-radius:4px;padding:20px 22px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--blue)}
.stat-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--gray-mid);font-weight:700;margin-bottom:8px}
.stat-value{font-size:28px;font-weight:700;color:var(--black);line-height:1;letter-spacing:-.5px}
.stat-sub{font-size:11px;color:var(--gray-mid);margin-top:5px}
.stat-up{color:var(--green)}

/* ── CARDS ──────────────────────────────────────────────────────────────────── */
.card{background:#fff;border:1.5px solid var(--gray-light);border-radius:4px;overflow:hidden;margin-bottom:20px}
.card-header{padding:16px 22px;border-bottom:1px solid var(--gray-light);display:flex;align-items:center;justify-content:space-between;background:#fff}
.card-title{font-size:15px;font-weight:700;color:var(--black);letter-spacing:-.2px}
.card-body{padding:0}

/* ── TABLE ──────────────────────────────────────────────────────────────────── */
.data-table{width:100%;border-collapse:collapse}
.data-table th{text-align:left;padding:10px 18px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--gray-mid);font-weight:700;border-bottom:1.5px solid var(--gray-light);background:#fafbfc}
.data-table td{padding:13px 18px;font-size:13px;color:var(--gray-text);border-bottom:1px solid #f0f0f0;vertical-align:middle}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:#fafbfc}
.data-table td strong{color:var(--black);font-weight:600}

/* ── BADGES ─────────────────────────────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:2px;font-size:11px;font-weight:600;letter-spacing:.02em}
.b-green{background:var(--green-light);color:var(--green);border:1px solid var(--green-border)}
.b-gold{background:var(--gold-light);color:#8a6020;border:1px solid var(--gold-border)}
.b-red{background:var(--red-light);color:var(--red);border:1px solid var(--red-border)}
.b-gray{background:#f0f0f0;color:var(--gray-mid);border:1px solid var(--gray-light)}
.b-blue{background:var(--blue-light);color:var(--blue);border:1px solid #a8c4f8}
.b-purple{background:#f0eeff;color:#5040b0;border:1px solid #c0b0f0}

/* ── PROGRESS BAR ───────────────────────────────────────────────────────────── */
.prog-bar{height:5px;background:#e8e8e8;border-radius:2px;overflow:hidden;margin-top:4px}
.prog-fill{height:100%;background:var(--blue);border-radius:2px}

/* ── BUTTONS ────────────────────────────────────────────────────────────────── */
.btn{padding:8px 16px;border-radius:3px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:all .12s;letter-spacing:.02em}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{background:var(--blue-dark)}
.btn-gold{background:var(--blue);color:#fff}.btn-gold:hover{background:var(--blue-dark)}
.btn-ghost{background:transparent;color:var(--gray-text);border:1.5px solid var(--gray-light)}.btn-ghost:hover{background:#f5f5f5;color:var(--black)}
.btn-sm{padding:6px 12px;font-size:11px}
.btn-danger{background:transparent;color:var(--red);border:1.5px solid var(--red-border)}.btn-danger:hover{background:var(--red-light)}

/* ── STUDENT PROFILE ────────────────────────────────────────────────────────── */
.profile-header{background:#fff;border:1.5px solid var(--gray-light);border-radius:4px;padding:26px;margin-bottom:20px;display:flex;align-items:center;gap:20px}
.profile-av{width:56px;height:56px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff;flex-shrink:0}
.profile-info{flex:1}
.profile-name{font-size:20px;font-weight:700;color:var(--black);margin-bottom:4px;letter-spacing:-.3px}
.profile-meta{font-size:13px;color:var(--gray-mid)}
.profile-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:16px}
.ps{background:var(--bg);border:1px solid var(--gray-light);border-radius:3px;padding:12px 14px}
.ps-label{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--gray-mid);font-weight:700;margin-bottom:4px}
.ps-value{font-size:20px;font-weight:700;color:var(--black);letter-spacing:-.3px}

/* ── MODULE STATUS ──────────────────────────────────────────────────────────── */
.module-status-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.ms-card{background:#fff;border:1.5px solid var(--gray-light);border-radius:4px;padding:18px}
.ms-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.ms-name{font-size:13px;font-weight:700;color:var(--black)}
.ms-lessons{font-size:12px;color:var(--gray-mid);margin-bottom:6px}

/* ── USER MANAGEMENT ────────────────────────────────────────────────────────── */
.user-form{background:#fff;border:1.5px solid var(--gray-light);border-radius:4px;padding:26px;margin-bottom:20px}
.user-form-title{font-size:15px;font-weight:700;margin-bottom:16px;color:var(--black);letter-spacing:-.2px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.form-select{width:100%;padding:11px 14px;border:1.5px solid var(--gray-light);border-radius:3px;font-size:14px;font-family:inherit;outline:none;background:#fff;color:var(--black);cursor:pointer}
.form-select:focus{border-color:var(--blue)}

/* ── BACK BUTTON ────────────────────────────────────────────────────────────── */
.back-btn{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:var(--gray-text);cursor:pointer;padding:7px 12px;border-radius:3px;border:1.5px solid var(--gray-light);background:#fff;margin-bottom:20px;transition:all .12s;font-family:inherit}
.back-btn:hover{color:var(--blue);border-color:var(--blue)}

/* ── EMPTY STATE ────────────────────────────────────────────────────────────── */
.empty{text-align:center;padding:48px 24px;color:var(--gray-mid)}
.empty-icon{font-size:40px;margin-bottom:12px}

/* ── TWO COL ────────────────────────────────────────────────────────────────── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px}

/* ── NOTIFICATION ───────────────────────────────────────────────────────────── */
.notif{background:var(--blue-light);border:1px solid #a8c4f8;border-radius:3px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:var(--blue);display:flex;align-items:center;gap:10px}
.notif-success{background:var(--green-light);border-color:var(--green-border);color:var(--green)}

/* ── SCHEDULE ───────────────────────────────────────────────────────────────── */
.sched-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid #f0f0f0}
.sched-item:last-child{border-bottom:none}
.sched-time{width:75px;font-size:12px;font-weight:700;color:var(--blue);flex-shrink:0}
.sched-info{flex:1}
.sched-name{font-size:13px;font-weight:600;color:var(--black)}
.sched-detail{font-size:11px;color:var(--gray-mid);margin-top:1px}

@media(max-width:768px){
  .sidebar{display:none}
  .main{margin-left:0}
  .stats-grid{grid-template-columns:1fr 1fr}
  .module-status-grid{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr}
  .two-col{grid-template-columns:1fr}
}
</style>
</head>

// ── STATE ─────────────────────────────────────────────────────────────────────
let S = {

function set(updates){ Object.assign(S, updates); render(); }

// ── AUTH ──────────────────────────────────────────────────────────────────────
function doLogin(){
  const user = USERS.find(u => u.email === S.loginEmail && u.password === S.loginPassword);
  if(user){
    set({user, page:"dashboard", loginError:""});

// ── HELPERS ───────────────────────────────────────────────────────────────────
function statusBadge(status, score){

            <option value="Custom">Custom</option>

          <input class="form-input" type="number" placeholder="e.g. 10" value="${revenueForm.seats}" oninput="revenueForm.seats=this.value">

function addRevenueAccount(){
  if(!revenueForm.name||!revenueForm.mrr){ alert("Please enter at least an account name and monthly amount."); return; }
  const newAcc = {
    id: REVENUE_ACCOUNTS.length + 1,
    name: revenueForm.name,
    type: revenueForm.type,
    seats: parseInt(revenueForm.seats)||0,
    mrr: parseInt(revenueForm.mrr)||0,
    plan: revenueForm.plan||"Custom",
    status: "active",
    notes: revenueForm.notes
  };
  REVENUE_ACCOUNTS.push(newAcc);
  revenueForm = {name:"", type:"corporate", seats:"", mrr:"", plan:"", notes:""};
  revenueNotif = `${newAcc.name} added — $${newAcc.mrr.toLocaleString()}/mo`;
  render();
  setTimeout(()=>{ revenueNotif=null; render(); }, 3000);
}

function toggleRevenueStatus(id){
  const acc = REVENUE_ACCOUNTS.find(a=>a.id===id);
  if(acc){ acc.status = acc.status==="active" ? "paused" : "active"; render(); }
}

function removeRevenueAccount(id){
  if(!confirm("Remove this account from revenue tracking?")) return;
  REVENUE_ACCOUNTS = REVENUE_ACCOUNTS.filter(a=>a.id!==id);
  render();
}

function addUser(){
  const f = S.addUserForm;
  if(!f.name||!f.email||!f.password){ alert("Please fill in all required fields."); return; }
  const newUser = {id: USERS.length+1, name:f.name, email:f.email, password:f.password, role:f.role, company:f.company};
  USERS.push(newUser);
  set({addUserForm:{name:"",email:"",password:"",role:"student",company:""}, notification:`${f.name} added as ${f.role}.`});
  setTimeout(()=>set({notification:null}), 3000);
}

function removeUser(id){
  if(!confirm("Remove this user?")) return;
  const idx = USERS.findIndex(u=>u.id===id);
  if(idx>-1){ USERS.splice(idx,1); render(); }
}
